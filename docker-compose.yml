services:
  leoai:
    build:
      context: .
      args:
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-eclipse-temurin:17-jre}
        JAR_URL: ${JAR_URL:-https://github.com/cha0upup/LeoAI/releases/download/V0.0.3/LeoAi-0.0.3.jar}
    image: leoai:local
    container_name: leoai
    restart: unless-stopped
    ports:
      - "${LEOAI_PORT:-8082}:8082"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LEO_PLUGIN_ENCRYPT_KEY: ${LEO_PLUGIN_ENCRYPT_KEY:-ikunikunikunikun}
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/data.db
      VFSPATH: /app/data/root
      JAVA_OPTS: ${JAVA_OPTS:-}
    volumes:
      - leoai-data:/app/data

volumes:
  leoai-data:
